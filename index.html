<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedInterp — Medical Interpreter Portal</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ============================================================
     NAVBAR (shared across all pages)
     ============================================================ -->
  <nav class="navbar">
    <div class="navbar-inner">
      <span class="navbar-logo">MedInterp <span>/ EN–RU</span></span>
      <div class="search-bar" id="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Search terms…" autocomplete="off" spellcheck="false" />
        <div class="search-dropdown hidden" id="search-dropdown"></div>
      </div>
      <div class="navbar-links">
        <button class="nav-btn active "><a href='#'>Home</a></button>
        <button class="nav-btn">About</button>
      </div>
    </div>
  </nav>


  <!-- ============================================================
     VIEW 1: HOME PAGE
     ============================================================ -->
  <div class="content">

    <div class="home-header">
      <h1>Medical Interpreter Portal</h1>
      <p>Russian – English terminology reference for medical interpreters</p>
    </div>

    <p class="grid-label">Browse by category</p>

    <div class="category-grid" id="category-grid"></div>

  </div><!-- /content -->

  <div id="orientation-lock-overlay" class="orientation-lock-overlay" aria-live="polite">
    <div>
      <p>Mobile support is only available in portrait mode.</p>
      <p>Please rotate your device back to portrait.</p>
    </div>
  </div>

  <script src="script_home.js"></script>
  <script src="search.js"></script>
</body>

</html>
