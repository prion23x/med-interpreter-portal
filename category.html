<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedInterp — Medical Interpreter Portal</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ============================================================
     NAVBAR (shared across all pages)
     ============================================================ -->
  <nav class="navbar">
    <div class="navbar-inner">
      <div class="search-bar" id="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Search terms…" autocomplete="off" spellcheck="false" />
        <button class="search-clear hidden" id="search-clear" tabindex="-1">✕</button>
        <div class="search-dropdown hidden" id="search-dropdown"></div>
      </div>
      <div class="navbar-links">
        <button class="nav-btn"><a href='./index.html'>Home</a></button>
      </div>
    </div>
  </nav>


  <!-- ============================================================
     VIEW 1: CATEGORY PAGE
     ============================================================ -->
  <div class="content content--wide" id="content">
  </div><!-- /content -->

  <!-- MODAL -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal()">
    <div class="modal-card" id="modal-card" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <div id="orientation-lock-overlay" class="orientation-lock-overlay" aria-live="polite">
    <div>
      <p>Mobile support is only available in portrait mode.</p>
      <p>Please rotate your device back to portrait.</p>
    </div>
  </div>

  <script src="script_category.js"></script>
  <script src="search.js"></script>

  <div id="section-nav" class="section-nav"></div>

</body>

</html>
